name: CI

# Pipeline d'intégration continue du frontend (SPA Vue 3 / Vite / TypeScript).
# Rejoue, sur chaque PR et chaque push sur main, exactement la check-list
# locale : lint → formatage → types → build → image Docker.

on:
  pull_request:
    branches: [main, dev]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  verify:
    name: Lint, types & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint)
        run: yarn lint

      - name: Format check (Prettier)
        run: yarn format:check

      - name: Type-check (vue-tsc)
        run: yarn type-check

      - name: Production build
        run: yarn build-only

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  docker:
    name: Build image (no push)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cofrap-frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cofrap-frontend:ci-${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
