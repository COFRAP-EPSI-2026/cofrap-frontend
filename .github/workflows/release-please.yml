name: Release Please

# Flux de release automatique (style Google) :
#   1. Tu pushes des commits Conventional (`feat:`, `fix:`…) sur `main`.
#   2. Release Please ouvre/maintient une PR « chore: release X.Y.Z » qui bumpe
#      package.json + Chart.yaml + values.yaml + le CHANGELOG.
#   3. Tu merges cette PR → Release Please crée le tag `vX.Y.Z` + la GitHub Release.
#   4. Le job `build-push` ci-dessous construit et pousse l'image sur GHCR.
#
# Le build est dans CE workflow (pas dans un workflow séparé) : un tag créé par
# GITHUB_TOKEN ne déclenche pas d'autre workflow — on enchaîne donc ici même.
#
# PRÉREQUIS (une seule fois) : Settings > Actions > General > Workflow permissions
#   → cocher « Allow GitHub Actions to create and approve pull requests ».
#   Sans ça : « GitHub Actions is not permitted to create or approve pull requests ».

on:
  push:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-push:
    name: Build & push image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cofrap-frontend
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # provenance: false → pas d'attestation = pas d'entrée "unknown/unknown" sur GHCR
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
