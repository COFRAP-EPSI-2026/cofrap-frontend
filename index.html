<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="COFRAP Cloud — création de compte, authentification 2FA et renouvellement des identifiants pour le PoC MSPR TPRE912.">
    <title>COFRAP Cloud</title>
    <meta name="theme-color" content="#1a3560" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0d1a2e" media="(prefers-color-scheme: dark)">
    <!-- Open Graph / Twitter Card — partage social.
         Le `og:title` et `og:description` sont statiques (suffisant pour un PoC interne) ;
         le `<title>` est lui rendu dynamique par route via `useDocumentTitle()`. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="COFRAP Cloud">
    <meta property="og:title" content="COFRAP Cloud">
    <meta property="og:description" content="Gestion sécurisée des identifiants : mot de passe 24 caractères, 2FA TOTP, rotation 6 mois.">
    <meta property="og:image" content="/logo-cofrap.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="COFRAP Cloud">
    <meta name="twitter:description" content="Gestion sécurisée des identifiants : mot de passe 24 caractères, 2FA TOTP, rotation 6 mois.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"></noscript>
    <!-- OpenDyslexic est chargé à la demande par useA11y (option « Police dyslexie »).
         Inutile de payer le coût réseau et le bloc render pour 95 % des visiteurs. -->

  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
