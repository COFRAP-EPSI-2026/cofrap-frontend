# Config nginx pour servir la SPA Vue (build Vite statique).
# Montée dans /etc/nginx/conf.d/default.conf de l'image nginx-unprivileged.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des fichiers texte.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Assets fingerprintés par Vite (nom hashé) → cache long et immuable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Sonde de santé (utilisée par le HEALTHCHECK Docker et les probes Kubernetes).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback : vue-router est en history mode, toute route inconnue
    # (/login, /register, /renew, ...) doit renvoyer index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
